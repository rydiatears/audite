<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Audite</title>
<meta name="theme-color" content="#171310" />
<meta name="description" content="A personal podcast player. Your feeds, your rules." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  html, body { margin:0; padding:0; background:#171310; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ============================================================
   AUDITE — a personal podcast player
   RSS-first · folders · play-through queue · position memory
   ============================================================ */

const PROXY = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

// ---------- storage helpers (all persistence lives here) ----------
async function sGet(key, fallback) {
  try {
    const v = localStorage.getItem("audite:" + key);
    return v !== null ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}
async function sSet(key, value) {
  try { localStorage.setItem("audite:" + key, JSON.stringify(value)); }
  catch (e) { console.error("storage save failed", key, e); }
}

// ---------- fetching & feed parsing ----------
// Some hosting/analytics services wrap the real feed URL in a tracking
// prefix (e.g. https://rss.pdrl.fm/3f8a3d/feeds.megaphone.fm/XYZ). If the
// wrapper breaks, the embedded URL usually still works.
function unwrapFeedUrl(url) {
  try {
    const u = new URL(url);
    const m = u.pathname.match(/\/([a-z0-9-]+(?:\.[a-z0-9-]+)+\/.+)/i);
    return m ? "https://" + m[1] : null;
  } catch { return null; }
}

async function fetchText(url) {
  // try direct first, then fall through the proxy chain for CORS-blocked feeds
  const chain = async (target) => {
    const attempts = [
      target,
      `https://corsproxy.io/?url=${encodeURIComponent(target)}`,
      PROXY(target),
    ];
    for (const attempt of attempts) {
      try {
        const r = await fetch(attempt);
        if (!r.ok) continue;
        const text = await r.text();
        if (text) return text;
      } catch {}
    }
    return null;
  };
  let text = await chain(url);
  if (text) return { text, finalUrl: url };
  const unwrapped = unwrapFeedUrl(url);
  if (unwrapped && unwrapped !== url) {
    text = await chain(unwrapped);
    if (text) return { text, finalUrl: unwrapped };
  }
  throw new Error("Couldn't reach this feed — proxies may be rate-limited, try again in a minute.");
}

function tagText(el, names) {
  for (const n of names) {
    const found = el.getElementsByTagName(n);
    if (found.length && found[0].textContent) return found[0].textContent.trim();
  }
  return "";
}

function parseDuration(str) {
  if (!str) return 0;
  if (/^\d+$/.test(str.trim())) return parseInt(str, 10);
  const parts = str.split(":").map((p) => parseInt(p, 10) || 0);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return 0;
}

function parseFeed(xmlText, feedUrl) {
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  if (doc.querySelector("parsererror")) throw new Error("This URL didn't return a readable podcast feed.");
  const channel = doc.getElementsByTagName("channel")[0];
  if (!channel) throw new Error("No podcast channel found in this feed.");

  const title = tagText(channel, ["title"]) || "Untitled podcast";
  let artwork = "";
  const itImg = channel.getElementsByTagName("itunes:image");
  if (itImg.length) artwork = itImg[0].getAttribute("href") || "";
  if (!artwork) {
    const img = channel.getElementsByTagName("image")[0];
    if (img) artwork = tagText(img, ["url"]);
  }
  const author = tagText(channel, ["itunes:author", "managingEditor"]);
  const description = tagText(channel, ["description", "itunes:summary"]);

  const items = Array.from(doc.getElementsByTagName("item")).slice(0, 150);
  const episodes = items
    .map((item) => {
      const enc = item.getElementsByTagName("enclosure")[0];
      const audioUrl = enc ? enc.getAttribute("url") : "";
      if (!audioUrl) return null;
      return {
        title: tagText(item, ["title"]) || "Untitled episode",
        audioUrl,
        guid: tagText(item, ["guid"]) || audioUrl,
        pubDate: tagText(item, ["pubDate"]),
        duration: parseDuration(tagText(item, ["itunes:duration"])),
        description: tagText(item, ["itunes:summary", "description"]).replace(/<[^>]+>/g, "").slice(0, 400),
      };
    })
    .filter(Boolean);

  return { title, artwork, author, description, feedUrl, episodes };
}

// ---------- misc helpers ----------
const fmtTime = (s) => {
  if (!s || !isFinite(s)) return "0:00";
  s = Math.floor(s);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0 ? `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}` : `${m}:${String(sec).padStart(2, "0")}`;
};
const fmtDate = (d) => {
  if (!d) return "";
  const dt = new Date(d);
  if (isNaN(dt)) return "";
  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
};
const uid = () => Math.random().toString(36).slice(2, 10);
const SPEEDS = [1, 1.2, 1.5, 1.75, 2, 0.8];

// ============================================================
function Audite() {
  const [loaded, setLoaded] = useState(false);
  const [pods, setPods] = useState([]);          // {id,title,artwork,feedUrl,folderId,author}
  const [folders, setFolders] = useState([]);    // {id,name}
  const [queue, setQueue] = useState([]);        // {audioUrl,epTitle,podTitle,artwork,guid,duration}
  const [positions, setPositions] = useState({});// audioUrl -> {sec,dur,epTitle,podTitle,artwork,updatedAt,done}
  const [speed, setSpeed] = useState(1);

  const [view, setView] = useState("library");   // library | queue | podcast | add
  const [activeFolder, setActiveFolder] = useState("all");
  const [openPod, setOpenPod] = useState(null);  // podcast object with episodes
  const [openPodMeta, setOpenPodMeta] = useState(null); // library entry for open pod
  const [podLoading, setPodLoading] = useState(false);
  const [podError, setPodError] = useState("");

  const [rssInput, setRssInput] = useState("");
  const [searchInput, setSearchInput] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [addBusy, setAddBusy] = useState(false);
  const [addMsg, setAddMsg] = useState("");

  const [current, setCurrent] = useState(null);  // same shape as queue item
  const [playing, setPlaying] = useState(false);
  const [curTime, setCurTime] = useState(0);
  const [curDur, setCurDur] = useState(0);
  const [expanded, setExpanded] = useState(false);
  const [toast, setToast] = useState("");

  const audioRef = useRef(null);
  const lastSaveRef = useRef(0);
  const queueRef = useRef(queue);
  const positionsRef = useRef(positions);
  const currentRef = useRef(current);
  queueRef.current = queue; positionsRef.current = positions; currentRef.current = current;

  // ---------- initial load ----------
  useEffect(() => {
    (async () => {
      const lib = await sGet("library", { podcasts: [], folders: [] });
      setPods(lib.podcasts || []);
      setFolders(lib.folders || []);
      setQueue(await sGet("queue", []));
      setPositions(await sGet("positions", {}));
      const settings = await sGet("settings", { speed: 1 });
      setSpeed(settings.speed || 1);
      setLoaded(true);
    })();
  }, []);

  const saveLibrary = useCallback((p, f) => { sSet("library", { podcasts: p, folders: f }); }, []);
  const saveQueue = useCallback((q) => { setQueue(q); sSet("queue", q); }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  // ---------- position memory ----------
  const savePosition = useCallback((item, sec, dur, done = false) => {
    if (!item) return;
    setPositions((prev) => {
      const next = { ...prev };
      if (done) {
        next[item.audioUrl] = { ...(next[item.audioUrl] || {}), sec: 0, dur, done: true, updatedAt: Date.now(), epTitle: item.epTitle, podTitle: item.podTitle, artwork: item.artwork };
      } else {
        next[item.audioUrl] = { sec, dur, done: false, updatedAt: Date.now(), epTitle: item.epTitle, podTitle: item.podTitle, artwork: item.artwork };
      }
      sSet("positions", next);
      return next;
    });
  }, []);

  // ---------- playback ----------
  const playItem = useCallback((item) => {
    const a = audioRef.current;
    if (!a) return;
    setCurrent(item);
    a.src = item.audioUrl;
    a.playbackRate = speed;
    const saved = positionsRef.current[item.audioUrl];
    const resumeAt = saved && !saved.done && saved.sec > 5 ? saved.sec : 0;
    const onMeta = () => {
      if (resumeAt && resumeAt < a.duration - 10) a.currentTime = resumeAt;
      a.removeEventListener("loadedmetadata", onMeta);
    };
    a.addEventListener("loadedmetadata", onMeta);
    a.play().then(() => setPlaying(true)).catch(() => {
      setPlaying(false);
      showToast("Tap play to start — the browser needs one tap.");
    });
    // lock-screen / notification controls where supported
    if ("mediaSession" in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: item.epTitle, artist: item.podTitle,
        artwork: item.artwork ? [{ src: item.artwork, sizes: "512x512" }] : [],
      });
      navigator.mediaSession.setActionHandler("play", () => { audioRef.current?.play(); setPlaying(true); });
      navigator.mediaSession.setActionHandler("pause", () => { audioRef.current?.pause(); setPlaying(false); });
      navigator.mediaSession.setActionHandler("seekbackward", () => skip(-10));
      navigator.mediaSession.setActionHandler("seekforward", () => skip(30));
    }
  }, [speed]);

  const togglePlay = () => {
    const a = audioRef.current;
    if (!a || !current) return;
    if (playing) { a.pause(); setPlaying(false); savePosition(current, a.currentTime, a.duration || 0); }
    else { a.play(); setPlaying(true); }
  };

  const skip = (delta) => {
    const a = audioRef.current;
    if (!a) return;
    a.currentTime = Math.max(0, Math.min((a.duration || Infinity) - 0.5, a.currentTime + delta));
  };

  const cycleSpeed = () => {
    const idx = SPEEDS.indexOf(speed);
    const next = SPEEDS[(idx + 1) % SPEEDS.length];
    setSpeed(next);
    if (audioRef.current) audioRef.current.playbackRate = next;
    sSet("settings", { speed: next });
  };

  const seekTo = (frac) => {
    const a = audioRef.current;
    if (!a || !a.duration) return;
    a.currentTime = frac * a.duration;
  };

  // audio element events
  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    const onTime = () => {
      setCurTime(a.currentTime);
      setCurDur(a.duration || 0);
      const now = Date.now();
      if (now - lastSaveRef.current > 10000 && currentRef.current) {
        lastSaveRef.current = now;
        savePosition(currentRef.current, a.currentTime, a.duration || 0);
      }
    };
    const onEnded = () => {
      const cur = currentRef.current;
      const q = queueRef.current;
      if (cur) savePosition(cur, 0, a.duration || 0, true);
      // advance through the queue
      let nextIdx = 0;
      const curIdx = q.findIndex((it) => it.audioUrl === cur?.audioUrl);
      let newQ = q;
      if (curIdx >= 0) { newQ = q.filter((_, i) => i !== curIdx); nextIdx = curIdx; }
      if (newQ.length > 0) {
        const next = newQ[Math.min(nextIdx, newQ.length - 1)];
        saveQueue(newQ);
        playItem(next);
      } else {
        if (newQ !== q) saveQueue(newQ);
        setPlaying(false);
      }
    };
    a.addEventListener("timeupdate", onTime);
    a.addEventListener("ended", onEnded);
    return () => { a.removeEventListener("timeupdate", onTime); a.removeEventListener("ended", onEnded); };
  }, [savePosition, saveQueue, playItem]);

  // ---------- subscribe / library ----------
  const subscribe = async (feedUrl, fromSearch) => {
    setAddBusy(true); setAddMsg("");
    try {
      if (pods.some((p) => p.feedUrl === feedUrl)) { setAddMsg("Already in your library."); setAddBusy(false); return; }
      const { text: xml, finalUrl } = await fetchText(feedUrl);
      const feed = parseFeed(xml, finalUrl);
      // if only the unwrapped URL worked, save that so refreshes skip the broken wrapper
      const entry = { id: uid(), title: feed.title, artwork: feed.artwork, feedUrl: finalUrl, folderId: null, author: feed.author };
      const next = [...pods, entry];
      setPods(next); saveLibrary(next, folders);
      setAddMsg(`Added: ${feed.title}`);
      if (!fromSearch) setRssInput("");
      showToast(`Subscribed to ${feed.title}`);
    } catch (e) {
      setAddMsg(e.message || "Couldn't add that feed.");
    }
    setAddBusy(false);
  };

  const unsubscribe = (podId) => {
    const next = pods.filter((p) => p.id !== podId);
    setPods(next); saveLibrary(next, folders);
    setView("library"); setOpenPod(null); setOpenPodMeta(null);
    showToast("Removed from library");
  };

  const setPodFolder = (podId, folderId) => {
    const next = pods.map((p) => (p.id === podId ? { ...p, folderId: folderId || null } : p));
    setPods(next); saveLibrary(next, folders);
    if (openPodMeta && openPodMeta.id === podId) setOpenPodMeta({ ...openPodMeta, folderId: folderId || null });
  };

  const addFolder = () => {
    const name = prompt("Folder name (e.g. History, Tech, Faith):");
    if (!name || !name.trim()) return;
    const f = { id: uid(), name: name.trim() };
    const next = [...folders, f];
    setFolders(next); saveLibrary(pods, next);
  };

  const deleteFolder = (fid) => {
    const next = folders.filter((f) => f.id !== fid);
    const nextPods = pods.map((p) => (p.folderId === fid ? { ...p, folderId: null } : p));
    setFolders(next); setPods(nextPods); saveLibrary(nextPods, next);
    if (activeFolder === fid) setActiveFolder("all");
  };

  // ---------- podcast detail ----------
  const openPodcast = async (podMeta) => {
    setView("podcast"); setOpenPodMeta(podMeta); setOpenPod(null); setPodError(""); setPodLoading(true);
    try {
      const { text: xml } = await fetchText(podMeta.feedUrl);
      const feed = parseFeed(xml, podMeta.feedUrl);
      setOpenPod(feed);
    } catch (e) {
      setPodError(e.message || "Couldn't load this feed right now.");
    }
    setPodLoading(false);
  };

  const epToItem = (ep, feed) => ({
    audioUrl: ep.audioUrl, epTitle: ep.title, podTitle: feed.title,
    artwork: feed.artwork, guid: ep.guid, duration: ep.duration,
  });

  const addToQueue = (item) => {
    if (queue.some((q) => q.audioUrl === item.audioUrl)) { showToast("Already in queue"); return; }
    saveQueue([...queue, item]);
    showToast("Added to queue");
  };

  const moveInQueue = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= queue.length) return;
    const q = [...queue];
    [q[idx], q[j]] = [q[j], q[idx]];
    saveQueue(q);
  };

  // ---------- search ----------
  const runSearch = async () => {
    if (!searchInput.trim()) return;
    setAddBusy(true); setSearchResults([]); setAddMsg("");
    const url = `https://itunes.apple.com/search?media=podcast&limit=12&term=${encodeURIComponent(searchInput.trim())}`;
    try {
      const { text } = await fetchText(url);
      const data = JSON.parse(text);
      const results = (data.results || []).filter((r) => r.feedUrl).map((r) => ({
        title: r.collectionName, artwork: r.artworkUrl100, feedUrl: r.feedUrl, author: r.artistName,
      }));
      setSearchResults(results);
      if (!results.length) setAddMsg("No results found — try the RSS URL directly if you have it.");
    } catch {
      setAddMsg("Search is unreachable right now. Pasting the RSS URL directly still works.");
    }
    setAddBusy(false);
  };

  // ---------- derived ----------
  const visiblePods = activeFolder === "all" ? pods : pods.filter((p) => p.folderId === activeFolder);
  const continueList = Object.entries(positions)
    .filter(([, v]) => !v.done && v.sec > 30 && (!v.dur || v.sec / v.dur < 0.97))
    .sort((a, b) => b[1].updatedAt - a[1].updatedAt)
    .slice(0, 3);

  const savedPos = (audioUrl) => {
    const p = positions[audioUrl];
    if (!p || p.done || p.sec < 30) return null;
    return p;
  };

  // ============================================================ styles
  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#171310; --surface:#221C16; --surface2:#2D251D; --line:#3A3025;
      --text:#F2E8DA; --muted:#A6937B; --amber:#F0A63C; --amber-deep:#C77B28; --danger:#D96C4F;
    }
    .aud { background:var(--bg); color:var(--text); min-height:100vh; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size:15px; line-height:1.45; padding-bottom:150px; }
    .display { font-family:'Fraunces', Georgia, serif; }
    .hdr { padding:18px 16px 10px; display:flex; align-items:baseline; justify-content:space-between; }
    .hdr h1 { font-family:'Fraunces', Georgia, serif; font-weight:700; font-size:26px; letter-spacing:0.5px; color:var(--amber); }
    .hdr .sub { color:var(--muted); font-size:12px; }
    .tabs { display:flex; gap:8px; padding:0 16px 12px; }
    .tab { flex:1; text-align:center; padding:9px 0; border-radius:10px; background:var(--surface); color:var(--muted); border:1px solid var(--line); font-size:14px; cursor:pointer; }
    .tab.on { background:var(--surface2); color:var(--amber); border-color:var(--amber-deep); font-weight:600; }
    .chips { display:flex; gap:8px; overflow-x:auto; padding:2px 16px 12px; scrollbar-width:none; }
    .chips::-webkit-scrollbar{ display:none; }
    .chip { white-space:nowrap; padding:7px 14px; border-radius:999px; background:var(--surface); border:1px solid var(--line); color:var(--muted); font-size:13px; cursor:pointer; }
    .chip.on { color:var(--bg); background:var(--amber); border-color:var(--amber); font-weight:600; box-shadow:0 0 12px rgba(240,166,60,0.35); }
    .chip.ghost { border-style:dashed; }
    .sect { padding:4px 16px 8px; }
    .sect h2 { font-family:'Fraunces', Georgia, serif; font-size:16px; font-weight:500; color:var(--muted); margin:10px 0 8px; letter-spacing:0.3px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:12px; padding:4px 16px; }
    .tile { cursor:pointer; }
    .tile img, .tile .ph { width:100%; aspect-ratio:1; border-radius:12px; object-fit:cover; background:var(--surface2); display:block; border:1px solid var(--line); }
    .tile .ph { display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:24px; font-family:'Fraunces',serif; }
    .tile .t { font-size:12px; margin-top:6px; color:var(--text); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }

    .row .meta { flex:1; min-width:0; }

    .row .meta .s { font-size:12px; color:var(--muted); margin-top:2px; }
    .btn { border:none; border-radius:10px; padding:9px 14px; font-size:13px; cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--line); }
    .btn.primary { background:var(--amber); color:#241A0C; font-weight:700; border-color:var(--amber); }
    .btn.small { padding:6px 10px; font-size:12px; border-radius:8px; }
    .btn.danger { color:var(--danger); border-color:var(--danger); background:transparent; }
    .btn:disabled { opacity:0.5; }
    .iconb { width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--surface2); color:var(--text); font-size:15px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .input { width:100%; padding:12px 14px; border-radius:12px; background:var(--surface); border:1px solid var(--line); color:var(--text); font-size:15px; outline:none; }
    .input:focus { border-color:var(--amber-deep); }
    .msg { padding:10px 16px; color:var(--muted); font-size:13px; }
    .err { color:var(--danger); }
    .resume-pill { font-size:11px; color:var(--amber); }
    .fab { position:fixed; right:16px; bottom:88px; width:54px; height:54px; border-radius:50%; background:var(--amber); color:#241A0C; font-size:28px; border:none; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.5); z-index:30; display:flex; align-items:center; justify-content:center; line-height:1; }
    .playerbar { position:fixed; left:0; right:0; bottom:0; background:var(--surface); border-top:1px solid var(--line); z-index:40; }
    .pb-mini { display:flex; align-items:center; gap:10px; padding:8px 12px; cursor:pointer; }
    .pb-mini img, .pb-mini .ph { width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--surface2); }
    .pb-mini .meta { flex:1; min-width:0; }
    .pb-mini .t { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pb-mini .s { font-size:11px; color:var(--muted); }
    .signal { height:3px; background:var(--line); position:relative; overflow:hidden; }
    .signal .fill { height:100%; background:linear-gradient(90deg, var(--amber-deep), var(--amber)); transition:width 0.4s linear; }
    .pb-full { padding:20px 20px 26px; }
    .pb-full .art { width:min(62vw,240px); aspect-ratio:1; border-radius:16px; object-fit:cover; display:block; margin:6px auto 16px; border:1px solid var(--line); background:var(--surface2); }
    .pb-full .et { font-family:'Fraunces',serif; font-size:18px; text-align:center; font-weight:600; }
    .pb-full .pt { text-align:center; color:var(--muted); font-size:13px; margin-top:4px; }
    .scrub { width:100%; margin:18px 0 2px; accent-color:var(--amber); height:4px; }
    .times { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; }
    .controls { display:flex; align-items:center; justify-content:center; gap:20px; margin-top:14px; }
    .ctl { background:none; border:none; color:var(--text); font-size:14px; cursor:pointer; width:52px; height:52px; border-radius:50%; }
    .ctl.play { width:66px; height:66px; background:var(--amber); color:#241A0C; font-size:24px; box-shadow:0 0 20px rgba(240,166,60,0.3); }
    .ctl.skip { border:1px solid var(--line); background:var(--surface2); font-size:12px; font-weight:600; }
    .speedb { position:absolute; right:20px; top:20px; }
    .collapse { position:absolute; left:20px; top:20px; }
    .toast { position:fixed; bottom:160px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--amber-deep); color:var(--text); padding:9px 18px; border-radius:999px; font-size:13px; z-index:60; box-shadow:0 4px 14px rgba(0,0,0,0.5); }
    .empty { text-align:center; color:var(--muted); padding:36px 24px; font-size:14px; }
    .empty .big { font-family:'Fraunces',serif; font-size:20px; color:var(--text); margin-bottom:8px; }
    select.input { appearance:auto; }
    .backlink { color:var(--amber); background:none; border:none; font-size:14px; cursor:pointer; padding:12px 16px 4px; }
    @media (prefers-reduced-motion: reduce) { .signal .fill { transition:none; } }
  `;

  if (!loaded) return <div style={{ background: "#171310", color: "#A6937B", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Georgia, serif" }}>Tuning in…</div>;

  const frac = curDur ? curTime / curDur : 0;

  return (
    <div className="aud">
      <style>{css}</style>
      <audio ref={audioRef} preload="metadata" />

      {/* ---------- header ---------- */}
      <div className="hdr">
        <h1>Audite</h1>
        <span className="sub">your feeds, your rules</span>
      </div>

      {view !== "podcast" && (
        <div className="tabs">
          <button className={`tab ${view === "library" ? "on" : ""}`} onClick={() => setView("library")}>Library</button>
          <button className={`tab ${view === "queue" ? "on" : ""}`} onClick={() => setView("queue")}>Queue{queue.length ? ` (${queue.length})` : ""}</button>
          <button className={`tab ${view === "add" ? "on" : ""}`} onClick={() => setView("add")}>Add</button>
        </div>
      )}

      {/* ---------- LIBRARY ---------- */}
      {view === "library" && (
        <>
          <div className="chips">
            <button className={`chip ${activeFolder === "all" ? "on" : ""}`} onClick={() => setActiveFolder("all")}>All</button>
            {folders.map((f) => (
              <button key={f.id} className={`chip ${activeFolder === f.id ? "on" : ""}`}
                onClick={() => setActiveFolder(f.id)}
                onDoubleClick={() => { if (confirm(`Delete folder "${f.name}"? Podcasts stay in your library.`)) deleteFolder(f.id); }}>
                {f.name}
              </button>
            ))}
            <button className="chip ghost" onClick={addFolder}>+ folder</button>
          </div>

          {continueList.length > 0 && activeFolder === "all" && (
            <div className="sect">
              <h2>Continue listening</h2>
              {continueList.map(([url, p]) => (
                <div className="row" key={url} style={{ borderRadius: 12, border: "1px solid var(--line)", marginBottom: 8, background: "var(--surface)" }}>
                  {p.artwork ? <img src={p.artwork} alt="" /> : <div className="ph">♪</div>}
                  <div className="meta">
                    <div className="t">{p.epTitle}</div>
                    <div className="s">{p.podTitle} · <span className="resume-pill">{fmtTime(p.sec)} in</span></div>
                  </div>
                  <button className="iconb" onClick={() => playItem({ audioUrl: url, epTitle: p.epTitle, podTitle: p.podTitle, artwork: p.artwork })}>▶</button>
                </div>
              ))}
            </div>
          )}

          {visiblePods.length === 0 ? (
            <div className="empty">
              <div className="big">Nothing on the dial yet</div>
              {pods.length === 0 ? <>Tap <b>Add</b> to paste an RSS feed or search for a show.</> : <>No podcasts in this folder yet. Open a podcast to assign it.</>}
            </div>
          ) : (
            <div className="grid">
              {visiblePods.map((p) => (
                <div className="tile" key={p.id} onClick={() => openPodcast(p)}>
                  {p.artwork ? <img src={p.artwork} alt={p.title} /> : <div className="ph">♪</div>}
                  <div className="t">{p.title}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* ---------- QUEUE ---------- */}
      {view === "queue" && (
        <>
          {queue.length === 0 ? (
            <div className="empty">
              <div className="big">Queue is empty</div>
              Open any podcast and tap <b>+ Queue</b> on episodes.<br />Then hit play once and it plays straight through.
            </div>
          ) : (
            <>
              <div style={{ padding: "4px 16px 12px" }}>
                <button className="btn primary" style={{ width: "100%", padding: "12px" }} onClick={() => playItem(queue[0])}>
                  ▶ Play through queue ({queue.length} episode{queue.length > 1 ? "s" : ""})
                </button>
              </div>
              {queue.map((it, i) => (
                <div className="row" key={it.audioUrl}>
                  {it.artwork ? <img src={it.artwork} alt="" /> : <div className="ph">♪</div>}
                  <div className="meta" onClick={() => playItem(it)} style={{ cursor: "pointer" }}>
                    <div className="t" style={current?.audioUrl === it.audioUrl ? { color: "var(--amber)" } : {}}>{it.epTitle}</div>
                    <div className="s">{it.podTitle}{savedPos(it.audioUrl) ? <> · <span className="resume-pill">{fmtTime(savedPos(it.audioUrl).sec)} in</span></> : ""}</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    <button className="btn small" disabled={i === 0} onClick={() => moveInQueue(i, -1)}>↑</button>
                    <button className="btn small" disabled={i === queue.length - 1} onClick={() => moveInQueue(i, 1)}>↓</button>
                  </div>
                  <button className="btn small danger" onClick={() => saveQueue(queue.filter((_, j) => j !== i))}>✕</button>
                </div>
              ))}
            </>
          )}
        </>
      )}

      {/* ---------- ADD ---------- */}
      {view === "add" && (
        <div className="sect">
          <h2>Add by RSS feed</h2>
          <div style={{ display: "flex", gap: 8 }}>
            <input className="input" placeholder="https://example.com/feed.xml" value={rssInput}
              onChange={(e) => setRssInput(e.target.value)} inputMode="url" autoCapitalize="off" />
            <button className="btn primary" disabled={addBusy || !rssInput.trim()} onClick={() => subscribe(rssInput.trim())}>Add</button>
          </div>

          <h2 style={{ marginTop: 22 }}>Or search the directory</h2>
          <div style={{ display: "flex", gap: 8 }}>
            <input className="input" placeholder="Search podcasts…" value={searchInput}
              onChange={(e) => setSearchInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && runSearch()} />
            <button className="btn" disabled={addBusy || !searchInput.trim()} onClick={runSearch}>Search</button>
          </div>

          {addBusy && <div className="msg">Working…</div>}
          {addMsg && <div className={`msg ${addMsg.startsWith("Couldn't") || addMsg.startsWith("Search is") || addMsg.startsWith("No results") || addMsg.startsWith("This URL") ? "err" : ""}`}>{addMsg}</div>}

          {searchResults.map((r) => (
            <div className="row" key={r.feedUrl}>
              {r.artwork ? <img src={r.artwork} alt="" /> : <div className="ph">♪</div>}
              <div className="meta">
                <div className="t">{r.title}</div>
                <div className="s">{r.author}</div>
              </div>
              {pods.some((p) => p.feedUrl === r.feedUrl)
                ? <span className="msg" style={{ padding: 0 }}>Added ✓</span>
                : <button className="btn small primary" disabled={addBusy} onClick={() => subscribe(r.feedUrl, true)}>Subscribe</button>}
            </div>
          ))}
        </div>
      )}

      {/* ---------- PODCAST DETAIL ---------- */}
      {view === "podcast" && (
        <>
          <button className="backlink" onClick={() => { setView("library"); setOpenPod(null); }}>← Library</button>
          {openPodMeta && (
            <div className="row" style={{ borderBottom: "none" }}>
              {openPodMeta.artwork ? <img src={openPodMeta.artwork} alt="" style={{ width: 76, height: 76, borderRadius: 14 }} /> : <div className="ph" style={{ width: 76, height: 76 }}>♪</div>}
              <div className="meta">
                <div className="t display" style={{ fontSize: 18, fontWeight: 600 }}>{openPodMeta.title}</div>
                <div className="s">{openPodMeta.author}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
                  <select className="input" style={{ padding: "6px 10px", fontSize: 12, width: "auto" }}
                    value={openPodMeta.folderId || ""} onChange={(e) => setPodFolder(openPodMeta.id, e.target.value)}>
                    <option value="">No folder</option>
                    {folders.map((f) => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                  <button className="btn small danger" onClick={() => { if (confirm("Remove this podcast from your library?")) unsubscribe(openPodMeta.id); }}>Unsubscribe</button>
                </div>
              </div>
            </div>
          )}
          {podLoading && <div className="msg">Loading episodes…</div>}
          {podError && <div className="msg err">{podError}</div>}
          {openPod && openPod.episodes.map((ep) => {
            const item = epToItem(ep, openPod);
            const pos = savedPos(ep.audioUrl);
            const done = positions[ep.audioUrl]?.done;
            const inQ = queue.some((q) => q.audioUrl === ep.audioUrl);
            return (
              <div className="row" key={ep.guid}>
                <div className="meta">
                  <div className="t" style={done ? { color: "var(--muted)" } : {}}>{done ? "✓ " : ""}{ep.title}</div>
                  <div className="s">
                    {fmtDate(ep.pubDate)}{ep.duration ? ` · ${fmtTime(ep.duration)}` : ""}
                    {pos ? <> · <span className="resume-pill">{fmtTime(pos.sec)} in</span></> : ""}
                  </div>
                </div>
                <button className="iconb" title="Play now" onClick={() => playItem(item)}>▶</button>
                <button className="btn small" disabled={inQ} onClick={() => addToQueue(item)}>{inQ ? "✓" : "+ Queue"}</button>
              </div>
            );
          })}
        </>
      )}

      {/* ---------- toast ---------- */}
      {toast && <div className="toast">{toast}</div>}

      {/* ---------- player ---------- */}
      {current && (
        <div className="playerbar">
          <div className="signal"><div className="fill" style={{ width: `${frac * 100}%` }} /></div>
          {!expanded ? (
            <div className="pb-mini" onClick={() => setExpanded(true)}>
              {current.artwork ? <img src={current.artwork} alt="" /> : <div className="ph">♪</div>}
              <div className="meta">
                <div className="t">{current.epTitle}</div>
                <div className="s">{current.podTitle} · {fmtTime(curTime)} / {fmtTime(curDur)}</div>
              </div>
              <button className="iconb" onClick={(e) => { e.stopPropagation(); skip(-10); }}>↺10</button>
              <button className="iconb" style={{ background: "var(--amber)", color: "#241A0C", border: "none" }}
                onClick={(e) => { e.stopPropagation(); togglePlay(); }}>{playing ? "❚❚" : "▶"}</button>
              <button className="iconb" onClick={(e) => { e.stopPropagation(); skip(30); }}>30↻</button>
            </div>
          ) : (
            <div className="pb-full" style={{ position: "relative" }}>
              <button className="btn small collapse" onClick={() => setExpanded(false)}>▾ minimize</button>
              <button className="btn small speedb" onClick={cycleSpeed}>{speed}×</button>
              {current.artwork ? <img className="art" src={current.artwork} alt="" /> : <div className="art ph display" style={{ display: "flex", alignItems: "center", justifyContent: "center", fontSize: 48 }}>♪</div>}
              <div className="et">{current.epTitle}</div>
              <div className="pt">{current.podTitle}</div>
              <input className="scrub" type="range" min="0" max="1000" value={Math.round(frac * 1000)}
                onChange={(e) => seekTo(parseInt(e.target.value, 10) / 1000)} />
              <div className="times"><span>{fmtTime(curTime)}</span><span>−{fmtTime(Math.max(0, curDur - curTime))}</span></div>
              <div className="controls">
                <button className="ctl skip" onClick={() => skip(-10)}>↺ 10</button>
                <button className="ctl play" onClick={togglePlay}>{playing ? "❚❚" : "▶"}</button>
                <button className="ctl skip" onClick={() => skip(30)}>30 ↻</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<Audite />);

</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.log("SW registration failed", e));
  });
}
</script>
</body>
</html>
